name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: 50-jubilee

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set image tags
        run: |
          echo "IMAGE=cr.yandex/${{ secrets.YC_REGISTRY_ID }}/${IMAGE_NAME}" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=${GITHUB_SHA}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Yandex Container Registry
        run: echo '${{ secrets.YC_SA_JSON_CREDENTIALS }}' | docker login --username json_key --password-stdin cr.yandex

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Prepare deploy files
        run: |
          mkdir -p .deploy
          cp docker-compose.yml .deploy/docker-compose.yml
          printf '%s\n' \
            'APP_IMAGE=${{ env.IMAGE }}:${{ env.IMAGE_TAG }}' \
            'DOMAIN=${{ secrets.DOMAIN }}' \
            'ACME_EMAIL=${{ secrets.ACME_EMAIL }}' \
            'ADMIN_SECRET=${{ secrets.ADMIN_SECRET }}' \
            'PRESENTER_SECRET=${{ secrets.PRESENTER_SECRET }}' \
            > .deploy/.env
          printf '%s' '${{ secrets.YC_SA_JSON_CREDENTIALS }}' > .deploy/yc-key.json

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s' '${{ secrets.SSH_PRIVATE_KEY }}' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H '${{ secrets.SERVER_HOST }}' >> ~/.ssh/known_hosts

      - name: Copy compose files
        run: |
          ssh '${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}' 'mkdir -p "${{ secrets.DEPLOY_PATH }}"'
          scp .deploy/docker-compose.yml .deploy/.env .deploy/yc-key.json '${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${{ secrets.DEPLOY_PATH }}/'

      - name: Deploy on server
        run: |
          ssh '${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}' 'set -euo pipefail; cd "${{ secrets.DEPLOY_PATH }}"; docker login --username json_key --password-stdin cr.yandex < yc-key.json; rm -f yc-key.json; docker compose pull; docker compose up -d --remove-orphans; docker image prune -f'
