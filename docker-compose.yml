services:
  traefik:
    image: traefik:v3.7.5
    restart: unless-stopped
    environment:
      DOCKER_API_VERSION: "1.40"
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.letsencrypt.acme.httpchallenge=true
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_letsencrypt:/letsencrypt

  app:
    image: ${APP_IMAGE}
    restart: unless-stopped
    environment:
      ADMIN_SECRET: ${ADMIN_SECRET}
      SQLITE_PATH: /data/rsvps.sqlite
      PORT: 3000
    volumes:
      - rsvp_data:/data
    labels:
      - traefik.enable=true
      - traefik.http.routers.jubilee.rule=Host(`${DOMAIN}`)
      - traefik.http.routers.jubilee.entrypoints=websecure
      - traefik.http.routers.jubilee.tls.certresolver=letsencrypt
      - traefik.http.services.jubilee.loadbalancer.server.port=3000
    depends_on:
      - traefik

volumes:
  rsvp_data:
  traefik_letsencrypt:
